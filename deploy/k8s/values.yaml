# -- Global image pull secrets for private registries (e.g. GHCR)
imagePullSecrets: []
# - name: ghcr-pull

# -- Base URL the app is served from (used for CORS, redirects, auth callbacks)
appUrl: http://localhost

# -- Annotations applied to every pod in the chart. Merged with per-component
# `<component>.podAnnotations`; per-component keys win on conflict.
# Implementation note: this uses Sprig `merge`, which is dst-wins (counter to
# many other merge libraries), so the per-component map is passed as the
# destination — see `thunderbolt.podAnnotations` in `templates/_helpers.tpl`.
podAnnotations: {}

# =============================================================================
# Frontend
# =============================================================================
frontend:
  image:
    repository: ghcr.io/thunderbird/thunderbolt/thunderbolt-frontend
    tag: latest
    pullPolicy: IfNotPresent
  replicas: 2
  service:
    port: 80
  # -- Pod annotations applied to frontend pods. Merged with top-level
  # `podAnnotations`; these win on key conflict.
  podAnnotations: {}
  # -- Pod resource requests/limits for the frontend container (nginx).
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 256Mi
  # -- Horizontal Pod Autoscaler configuration. Scales frontend based on CPU utilization.
  autoscaling:
    enabled: true
    minReplicas: 2
    maxReplicas: 5
    targetCPUUtilizationPercentage: 75
  # -- Pod disruption budget. Ensures at least 1 frontend pod is always available during disruptions.
  poddisruptionbudget:
    enabled: true
    minAvailable: 1

# =============================================================================
# Marketing (Astro static site: landing page, blog, docs)
# =============================================================================
marketing:
  image:
    repository: ghcr.io/thunderbird/thunderbolt/thunderbolt-marketing
    tag: latest
    pullPolicy: IfNotPresent
  replicas: 1
  service:
    port: 80
  # -- Pod annotations applied to marketing pods. Merged with top-level
  # `podAnnotations`; these win on key conflict.
  podAnnotations: {}
  # -- Pod resource requests/limits for the marketing container.
  resources: {}

# =============================================================================
# Backend
# =============================================================================
backend:
  image:
    repository: ghcr.io/thunderbird/thunderbolt/thunderbolt-backend
    tag: latest
    pullPolicy: IfNotPresent
  replicas: 2
  service:
    port: 8000
  # -- Better Auth secret is now sourced from external secrets (aifam-secrets).
  # See templates/external-secrets.yaml for configuration details.
  env:
    authMode: oidc
    waitlistEnabled: "false"
    databaseDriver: postgres
    rateLimitEnabled: "false"
    # -- Thunderbolt inference gateway URL (plaintext; empty disables the provider)
    thunderboltInferenceUrl: ""
  # -- AI provider keys are now sourced from external secrets (aifam-secrets).
  # Empty defaults disable each provider (backend zod schema treats empty string as "not configured").
  # See templates/external-secrets.yaml for configuration details.
  aiSecrets: {}
  # -- Pod annotations applied to backend pods. Merged with top-level
  # `podAnnotations`; these win on key conflict.
  podAnnotations: {}
  # -- Pod resource requests/limits for the backend container (Bun runtime).
  # Tuned for typical AIFAM workloads: API gateway, LLM routing, vector DB access.
  resources:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      cpu: 1000m
      memory: 1Gi
  # -- Horizontal Pod Autoscaler configuration. Scales backend based on CPU and memory utilization.
  autoscaling:
    enabled: true
    minReplicas: 2
    maxReplicas: 10
    targetCPUUtilizationPercentage: 70
    targetMemoryUtilizationPercentage: 80
  # -- Pod disruption budget. Ensures at least 1 backend pod is always available during disruptions.
  poddisruptionbudget:
    enabled: true
    minAvailable: 1

# =============================================================================
# PostgreSQL
# =============================================================================
postgres:
  image:
    repository: postgres
    tag: 17-alpine
  storage: 5Gi
  credentials:
    user: postgres
    database: postgres
    # -- Password is now sourced from external secrets (aifam-secrets, key: postgres-password).
    # See templates/external-secrets.yaml for configuration details.
  # -- TLS mode for Postgres connections. Wired into both the backend's
  # `DATABASE_URL` (as `?sslmode=...`) and PowerSync's `replication`/`storage`
  # config. Default `disable` matches the in-cluster StatefulSet which ships
  # without TLS. Set to `require` (or stricter) when pointing at a
  # TLS-terminating Postgres like RDS.
  sslmode: disable
  # -- Pod annotations applied to postgres pods. Merged with top-level
  # `podAnnotations`; these win on key conflict.
  podAnnotations: {}
  # -- Pod resource requests/limits for the postgres container (StatefulSet).
  # Postgres is stateful and does NOT autoscale. Higher memory for shared buffers.
  # Set shared_buffers to 25% of memory limit (e.g., 256MB for 1Gi limit).
  resources:
    requests:
      cpu: 500m
      memory: 1Gi
    limits:
      cpu: 2000m
      memory: 2Gi
  # -- Postgres does NOT autoscale (stateful). Manual scaling only via StatefulSet replicas.
  # No PDB configured (single-pod stateful service; PDB would prevent maintenance).

# =============================================================================
# PowerSync
# =============================================================================
powersync:
  image:
    repository: journeyapps/powersync-service
    tag: latest
  replicas: 2
  service:
    port: 8080
  jwt:
    kid: enterprise-powersync
    # -- JWT signing secret is now sourced from external secrets (aifam-secrets, key: powersync-jwt-secret).
    # Must be base64url-encoded (RFC 7518) with decoded length >= 32 chars.
    # See templates/external-secrets.yaml for configuration details.
  db:
    # -- PowerSync database password is now sourced from external secrets (aifam-secrets, key: powersync-db-password).
    # See templates/external-secrets.yaml for configuration details.
  # -- Pod annotations applied to powersync pods. Merged with top-level
  # `podAnnotations`; these win on key conflict.
  podAnnotations: {}
  # -- Pod resource requests/limits for the powersync container (sync service).
  resources:
    requests:
      cpu: 250m
      memory: 256Mi
    limits:
      cpu: 1000m
      memory: 1Gi
  # -- Horizontal Pod Autoscaler configuration. Scales PowerSync based on CPU utilization.
  autoscaling:
    enabled: true
    minReplicas: 2
    maxReplicas: 5
    targetCPUUtilizationPercentage: 70
  # -- Pod disruption budget. Ensures at least 1 PowerSync pod is always available during disruptions.
  poddisruptionbudget:
    enabled: true
    minAvailable: 1

# =============================================================================
# Keycloak (OIDC Identity Provider)
# =============================================================================
keycloak:
  image:
    repository: quay.io/keycloak/keycloak
    tag: "26.0"
  replicas: 1
  service:
    port: 8080
  admin:
    username: admin
    # -- Admin password is now sourced from external secrets (aifam-secrets, key: keycloak-admin-password).
    # See templates/external-secrets.yaml for configuration details.
  oidc:
    clientId: thunderbolt-app
    # -- OIDC client secret is now sourced from external secrets (aifam-secrets, key: oidc-client-secret).
    # See templates/external-secrets.yaml for configuration details.
  # -- Include a `demo@thunderbolt.io` / `demo` user in the imported realm.
  # Convenient for local/preview environments and docs walk-throughs; set to
  # `false` for production deployments. Default `true` preserves current behavior.
  #
  # IMPORTANT: realm import is one-shot. Keycloak only imports the realm JSON
  # on first boot of an empty database, so flipping this from `true` to `false`
  # on an existing cluster does NOT delete a previously-imported demo user.
  # To remove an already-imported demo user, delete it from the Keycloak admin
  # console (Users → demo → Delete), or destroy the Keycloak storage volume.
  demoUserEnabled: true
  # -- Pod annotations applied to keycloak pods. Merged with top-level
  # `podAnnotations`; these win on key conflict.
  podAnnotations: {}
  # -- Pod resource requests/limits for the keycloak container (Java, requires heap).
  # Set JVM heap to ~80% of memory limit. For 1Gi limit: -Xmx768m
  resources:
    requests:
      cpu: 500m
      memory: 512Mi
    limits:
      cpu: 2000m
      memory: 1Gi
  # -- Keycloak is a single-pod auth instance (NOT autoscaled). Manual scaling only.
  # No PDB configured (single-pod SPOF, PDB would prevent all maintenance).

# =============================================================================
# Ingress
# =============================================================================
ingress:
  enabled: true
  className: nginx
  annotations:
    nginx.ingress.kubernetes.io/proxy-buffer-size: "128k"
    nginx.ingress.kubernetes.io/proxy-buffers-number: "4"
  # -- Set to your domain for production; leave empty for default rule
  host: ""
