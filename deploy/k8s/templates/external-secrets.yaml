{{- /*
External Secrets Integration for Secret Management

This template implements secure secret management by:
1. Defining a SecretStore that connects to an external secret provider (1Password or Vault)
2. Creating ExternalSecret resources that reference secrets in the external store
3. Syncing those secrets into Kubernetes Secret objects that services can consume

The SecretStore can be configured to use either:
- 1Password (OnePassword) — requires AIFAM_ONEPASSWORD_TOKEN in credentials
- HashiCorp Vault — requires VAULT_ADDR and VAULT_TOKEN in environment

To enable this integration, set `externalSecrets.enabled: true` in values.yaml and
configure the appropriate backend (see values.yaml for examples).

Note: The external-secrets operator must be installed in the cluster first:
  helm repo add external-secrets https://charts.external-secrets.io
  helm install external-secrets external-secrets/external-secrets -n external-secrets-system --create-namespace
*/}}

{{- if .Values.externalSecrets.enabled }}
---
# SecretStore defines the connection to the external secret provider
apiVersion: external-secrets.io/v1beta1
kind: SecretStore
metadata:
  name: {{ .Values.externalSecrets.secretStore.name | default "aifam-secret-store" }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "thunderbolt.labels" . | nindent 4 }}
spec:
  provider:
    {{- if eq .Values.externalSecrets.provider "onepassword" }}
    onepassword:
      connectHost: {{ .Values.externalSecrets.onepassword.connectHost | default "http://onepassword-connect:8080" }}
      auth:
        secretRef:
          secretAccessKey:
            name: onepassword-connect-token
            key: token
      {{- if .Values.externalSecrets.onepassword.vaults }}
      vaults:
        {{- .Values.externalSecrets.onepassword.vaults | toYaml | nindent 8 }}
      {{- end }}
    {{- else if eq .Values.externalSecrets.provider "vault" }}
    vault:
      server: {{ .Values.externalSecrets.vault.server | default "http://vault:8200" }}
      path: {{ .Values.externalSecrets.vault.path | default "secret" }}
      version: {{ .Values.externalSecrets.vault.version | default "v2" }}
      auth:
        kubernetes:
          mountPath: {{ .Values.externalSecrets.vault.authMountPath | default "kubernetes" }}
          role: {{ .Values.externalSecrets.vault.role | default "aifam-secrets-reader" }}
    {{- end }}

{{- end }}

{{- if and .Values.externalSecrets.enabled .Values.externalSecrets.secretsToSync }}
---
# ExternalSecret: Better Auth Secret
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: better-auth-external
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "thunderbolt.labels" . | nindent 4 }}
spec:
  refreshInterval: {{ .Values.externalSecrets.refreshInterval | default "1h" }}
  secretStoreRef:
    name: {{ .Values.externalSecrets.secretStore.name | default "aifam-secret-store" }}
    kind: SecretStore
  target:
    name: thunderbolt-secrets
    creationPolicy: Owner
    template:
      metadata:
        labels:
          {{- include "thunderbolt.labels" . | nindent 10 }}
  data:
    - secretKey: better-auth-secret
      remoteRef:
        key: {{ .Values.externalSecrets.betterAuthPath | default "aifam/secrets/better-auth-secret" }}

