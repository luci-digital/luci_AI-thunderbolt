{{- /*
Horizontal Pod Autoscalers (HPA) dynamically scale stateless deployments based
on resource metrics (CPU and memory utilization).

Scaling behavior:
- Scale-up: Triggered when utilization exceeds target; typically takes 1-3 minutes
- Scale-down: Conservative (5 min stabilization window) to avoid thrashing
- Min/max replicas: Configured per deployment in values.yaml

Stateful services (postgres, keycloak) do NOT autoscale. Manual scaling via
StatefulSet replicas only. HPA is disabled for these components.

Autoscaling can be disabled per-component by setting `enabled: false` in values.yaml.

Note: Requires metrics-server to be installed in the cluster.
*/ -}}

{{- if .Values.backend.autoscaling.enabled }}
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: backend-hpa
  labels:
    {{- include "thunderbolt.labels" . | nindent 4 }}
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: backend
  minReplicas: {{ .Values.backend.autoscaling.minReplicas }}
  maxReplicas: {{ .Values.backend.autoscaling.maxReplicas }}
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: {{ .Values.backend.autoscaling.targetCPUUtilizationPercentage }}
    {{- if .Values.backend.autoscaling.targetMemoryUtilizationPercentage }}
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: {{ .Values.backend.autoscaling.targetMemoryUtilizationPercentage }}
    {{- end }}
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 60
      policies:
        - type: Percent
          value: 100
          periodSeconds: 30
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - type: Percent
          value: 10
          periodSeconds: 60
---
{{- end }}

