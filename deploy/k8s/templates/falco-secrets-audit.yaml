################################################################################
# Falco Rules and Alerts for Secret Access Audit
#
# Purpose: Monitor and alert on sensitive secret access patterns that may
# indicate unauthorized access, credential theft, or compliance violations.
#
# This template provides a Falco rule ConfigMap for detecting:
# - kubectl get/describe/edit secret commands
# - Direct secret access from containers
# - Secret mounting in privileged contexts
# - Suspicious decodings or exports of secret data
#
# Deployment:
# 1. Install Falco: https://falco.org/docs/install/
# 2. Configure monitoring backend (Datadog, Splunk, Slack, etc.)
# 3. Deploy this ConfigMap to the cluster
# 4. Falco will automatically load rules on startup
#
# NOTE: This is a stub configuration. For production:
# - Add Falco service + DaemonSet deployment
# - Configure output backends (alerts, logging, webhooks)
# - Tune rules to reduce false positives
# - Integrate with SIEM/security monitoring
#
################################################################################

{{- if .Values.falcoSecretsAudit.enabled }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: falco-secrets-audit-rules
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "thunderbolt.labels" . | nindent 4 }}
    app: falco
data:
  secrets-audit.yaml: |
    # Falco rule for detecting secret access via kubectl

    - rule: Suspicious kubectl secret access
      desc: Detect attempts to access or modify Kubernetes secrets
      condition: >
        (spawned_process and
         container and
         (proc.name in (kubectl) or container.image.repo contains "kubectl") and
         (proc.cmdline contains "get secret" or
          proc.cmdline contains "describe secret" or
          proc.cmdline contains "edit secret" or
          proc.cmdline contains "patch secret" or
          proc.cmdline contains "delete secret"))
      output: >
        SECRET_ACCESS
        user=%user.name
        command=%proc.cmdline
        container=%container.name
        namespace=%k8s.ns.name
      priority: WARNING
      tags: [secrets, kubernetes, access_control]

    - rule: Secret data exfiltration attempt
      desc: Detect attempts to read/export secret values
      condition: >
        (spawned_process and
         (proc.cmdline contains "get secret" and
          (proc.cmdline contains "-o json" or
           proc.cmdline contains "-o yaml" or
           proc.cmdline contains "-o wide")) and
         (user.name not in (system:admin, automation_user)))
      output: >
        SECRET_EXFILTRATION_ATTEMPT
        user=%user.name
        command=%proc.cmdline
        container=%container.name
      priority: CRITICAL
      tags: [secrets, kubernetes, exfiltration]

    - rule: Secret mounted in privileged container
      desc: Detect secrets mounted in containers with elevated privileges
      condition: >
        (container.privileged = true and
         container.mounts contains "secret" and
         not container.image.repo in (trusted_privileged_images))
      output: >
        PRIVILEGED_SECRET_ACCESS
        container=%container.name
        image=%container.image.tag
        namespace=%k8s.ns.name
      priority: WARNING
      tags: [secrets, kubernetes, privilege_escalation]

    - rule: Secret write in non-standard namespace
      desc: Detect secret creation outside of expected namespaces
      condition: >
        (k8s.operation = "create" and
         k8s.resource = "secrets" and
         k8s.ns.name not in (default, kube-system, kube-public, thunderbolt))
      output: >
        SECRET_WRITE_ANOMALY
        user=%user.name
        namespace=%k8s.ns.name
        secret=%k8s.obj.name
      priority: MEDIUM
      tags: [secrets, kubernetes, anomaly]

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: falco-secrets-audit-backend-config
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "thunderbolt.labels" . | nindent 4 }}
    app: falco
data:
  backend-config.yaml: |
    # Configure where Falco sends alerts
    # Supported backends:
    # - stdout: print to console
    # - syslog: send to syslog server
    # - http: webhook to external service
    # - file: write to file
    #
    # Example configurations (uncomment and customize):

    # stdout:
    #   enabled: true

    # syslog:
    #   enabled: true
    #   host: syslog.default.svc.cluster.local
    #   port: 514
    #   facility: LOG_LOCAL0

    # http:
    #   enabled: true
    #   url: "http://security-monitoring.default.svc.cluster.local:8080/alerts"
    #   method: "POST"
    #   headers:
    #     Authorization: "Bearer {{ .Values.falcoSecretsAudit.webhookToken }}"

---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: falco-secrets-audit
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "thunderbolt.labels" . | nindent 4 }}
    app: falco

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: falco-secrets-audit
  labels:
    {{- include "thunderbolt.labels" . | nindent 4 }}
    app: falco
rules:
  # Falco needs to read audit events and pod information
  - apiGroups: [""]
    resources: ["pods", "pods/logs"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["audit.k8s.io"]
    resources: ["events"]
    verbs: ["get", "list", "watch"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: falco-secrets-audit
  labels:
    {{- include "thunderbolt.labels" . | nindent 4 }}
    app: falco
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: falco-secrets-audit
subjects:
  - kind: ServiceAccount
    name: falco-secrets-audit
    namespace: {{ .Release.Namespace }}

---
# STUB: Full Falco DaemonSet deployment would go here.
# For production, deploy Falco via Helm chart:
#   helm repo add falcosecurity https://falcosecurity.github.io/charts
#   helm install falco falcosecurity/falco -n falco --create-namespace
#
# This ConfigMap provides the rule definitions; the DaemonSet is optional.

{{- end }}
