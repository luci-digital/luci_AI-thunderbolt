{{- if not .Values.externalSecrets.enabled }}
# ============================================================================
# DEPRECATED: Hardcoded Secrets (for backward compatibility / testing only)
# ============================================================================
# This Secret template is kept for development/testing when external secrets
# are not enabled. For production deployments, use external-secrets.yaml
# which sources secrets from 1Password, Vault, or other secure stores.
#
# When externalSecrets.enabled: true, this Secret is skipped entirely and
# the external secrets operator (ESO) manages the thunderbolt-secrets Secret.
# ============================================================================
apiVersion: v1
kind: Secret
metadata:
  name: thunderbolt-secrets
  labels:
    {{- include "thunderbolt.labels" . | nindent 4 }}
type: Opaque
data:
  # WARNING: These values are only used when externalSecrets.enabled: false
  # For production, set externalSecrets.enabled: true and provide secrets via
  # your external secret store (1Password, Vault, etc.)

  # Fallback OIDC client secret (dev/test only; empty in production)
  oidc-client-secret: {{ .Values.keycloak.oidc.clientSecretBase64 | default "" | b64enc }}

  # Fallback PowerSync JWT secret (dev/test only; empty in production)
  powersync-jwt-secret: {{ .Values.powersync.jwt.secretBase64 | default "" | b64enc }}

  # Fallback Postgres password (dev/test only; empty in production)
  postgres-password: {{ .Values.postgres.credentials.passwordBase64 | default "" | b64enc }}

  # Fallback Better Auth secret (dev/test only; empty in production)
  better-auth-secret: {{ .Values.backend.betterAuthSecretBase64 | default "" | b64enc }}

  # Fallback PowerSync DB password (dev/test only; empty in production)
  powersync-db-password: {{ .Values.powersync.db.passwordBase64 | default "" | b64enc }}

  # AI provider keys (optional, empty disables each provider)
  anthropic-api-key: {{ .Values.backend.aiSecrets.anthropicApiKeyBase64 | default "" | quote }}
  fireworks-api-key: {{ .Values.backend.aiSecrets.fireworksApiKeyBase64 | default "" | quote }}
  mistral-api-key: {{ .Values.backend.aiSecrets.mistralApiKeyBase64 | default "" | quote }}
  thunderbolt-inference-api-key: {{ .Values.backend.aiSecrets.thunderboltInferenceApiKeyBase64 | default "" | quote }}
  exa-api-key: {{ .Values.backend.aiSecrets.exaApiKeyBase64 | default "" | quote }}

stringData:
  # The `data:` block above stores `powersync-jwt-secret` as the *decoded* JWT
  # signing secret (k8s base64-decodes anything under `data:` once). This entry
  # is different: it must surface the *base64 string itself* to PowerSync at
  # runtime, so we put the user-supplied `secretBase64` under `stringData` —
  # k8s base64-encodes it on write, then decodes on env injection, leaving the
  # base64 string intact for the PowerSync config to consume via
  # `!env POWERSYNC_JWT_SECRET_B64` and place into the JWK `k` field.
  #
  # WARNING: JWKs require RFC 7518 base64*url* (alphabet `A-Z a-z 0-9 - _`),
  # not the standard base64 produced by `openssl rand -base64` (which can
  # include `+`, `/`, and `=`). A standard-base64 secret will trip the JWK
  # parser. Use `openssl rand 32 | basenc --base64url --wrap=0` or post-process
  # `tr '+/' '-_' | tr -d '='` to produce a JWK-safe value.
  powersync-jwt-secret-b64: {{ .Values.powersync.jwt.secretBase64 | default "" | quote }}

{{- end }}
