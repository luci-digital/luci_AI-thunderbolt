# Build, smoke-test, and (on a tag) publish the zeus CLI.
#
# On every push/PR touching zeus/** we bundle zeus.cjs and prove all three
# entry points work: --help exits 0, the ACP face prints its `listening`
# banner, the MCP face prints its `mcp-listening` banner. On a `zeus-v*` tag we
# additionally attach zeus.cjs to the tag's GitHub Release, which install.sh
# fetches via releases/download/zeus-v<v>/.

name: zeus release

on:
  push:
    branches: [main]
    paths: ['zeus/**']
    tags: ['zeus-v*']
  pull_request:
    paths: ['zeus/**']
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

defaults:
  run:
    working-directory: zeus

jobs:
  build:
    name: Build & smoke-test zeus.cjs
    runs-on: ubuntu-24.04
    # `contents: write` is required by the tag-publish step (gh release create/upload).
    # GitHub Actions forbids ${{ }} expressions in `permissions`, so this is a static
    # literal. Safe: the publish step is gated by `if: startsWith(github.ref,
    # 'refs/tags/zeus-v')`, so non-tag runs never write, and fork-PR tokens are
    # read-only regardless of this setting.
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '22'

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: 1.3.14

      - run: bun install --frozen-lockfile
      - run: bun run build

      # zeus.cjs parses and --help exits 0 (no child, no framing at risk).
      - name: Smoke --help
        run: |
          node dist/zeus.cjs bridge --help | grep -q "zeus"
          node dist/zeus.cjs --version

      # ACP face: bind the WS face over a trivial `cat` child and confirm the
      # readiness banner reaches stderr (token: `listening`). Capture stderr to a
      # file, poll until the banner lands, then kill the still-running bridge.
      - name: Smoke ACP (listening)
        run: |
          node dist/zeus.cjs bridge --mode acp --json -- cat 2>acp.log &
          pid=$!
          for _ in $(seq 1 50); do
            grep -q '"event":"listening"' acp.log && break
            sleep 0.2
          done
          kill "$pid" 2>/dev/null || true
          grep -q '"event":"listening"' acp.log
          grep -q 'ws://127.0.0.1:' acp.log

      # MCP face: bridge the bundled server-everything stdio server and confirm
      # the readiness banner reaches stderr (token: `mcp-listening`).
      - name: Smoke MCP (mcp-listening)
        run: |
          node dist/zeus.cjs bridge --mode mcp --json -- \
            node node_modules/@modelcontextprotocol/server-everything/dist/index.js stdio 2>mcp.log &
          pid=$!
          for _ in $(seq 1 50); do
            grep -q '"event":"mcp-listening"' mcp.log && break
            sleep 0.2
          done
          kill "$pid" 2>/dev/null || true
          grep -q '"event":"mcp-listening"' mcp.log
          grep -q 'http://127.0.0.1:' mcp.log

      - name: Publish zeus.cjs (+ sha256) to the tag's GitHub Release
        if: startsWith(github.ref, 'refs/tags/zeus-v')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        # Emit the checksum with a bare `zeus.cjs` basename (cd into dist) so the
        # published .sha256 is in plain `shasum -a 256 -c` format; install.sh
        # verifies the downloaded bundle against it before installing.
        run: |
          ( cd dist && shasum -a 256 zeus.cjs > zeus.cjs.sha256 )
          if gh release view "${GITHUB_REF_NAME}" >/dev/null 2>&1; then
            gh release upload "${GITHUB_REF_NAME}" \
              dist/zeus.cjs dist/zeus.cjs.sha256 --clobber
          else
            gh release create "${GITHUB_REF_NAME}" \
              dist/zeus.cjs dist/zeus.cjs.sha256 \
              --title "${GITHUB_REF_NAME}" --generate-notes
          fi
